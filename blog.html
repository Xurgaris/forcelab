<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blog | ForceLab</title>
    <meta
      name="description"
      content="Conteúdo direto, prático e organizado para decisão de compra."
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="shortcut icon" href="/img/force-logo.png" type="image/x-icon" />
  </head>

  <body>
  <body data-page="blog">
  <div id="siteHeaderMount"></div>

    <div id="mobileMenu" class="mobile-menu" aria-hidden="true">
      <div class="mobile-menu-inner" role="dialog" aria-label="Menu mobile">
        <div class="mobile-menu-top">
          <strong>Menu</strong>

          <button
            class="mobile-top-account nav-account"
            type="button"
            aria-label="Abrir minha conta"
            data-open-account
          >
            <svg
              class="acc-ico"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2-8 4.5V21h16v-2.5C20 16 16.42 14 12 14Z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <button class="mobile-close" type="button" aria-label="Fechar menu">
            ✖
          </button>
        </div>

        <nav class="mobile-links" aria-label="Links do menu mobile">
          <a href="/catalogo.html">Categorias</a>
          <a href="/catalogo.html?tag=creatina">Creatina</a>
          <a href="/catalogo.html?tag=proteinas">Proteínas</a>
          <a href="/catalogo.html?tag=pre-treino">Pré-Treino</a>
          <a href="/index.html#kits">Kits</a>
          <a href="/blog.html">Blog</a>
          <a href="/index.html#contato">Contato</a>
        </nav>
      </div>
    </div>

    <main class="container" style="padding: 28px 0">
      <section class="blog-hero">
        <div>
          <h1>Blog</h1>
          <p class="muted">
            Conteúdo direto, prático e organizado para decisão de compra.
          </p>
        </div>
        <a class="btn btn-ghost" href="#allPosts">Ver todos</a>
      </section>

      <section class="blog-controls" aria-label="Busca e filtros">
        <div class="blog-search">
          <span aria-hidden="true">🔎</span>
          <input
            id="blogSearch"
            type="search"
            placeholder="Buscar por assunto, produto ou objetivo..."
          />
        </div>

        <div class="blog-filters">
          <select id="blogCategory">
            <option value="all">Todas categorias</option>
          </select>

          <select id="blogSort">
            <option value="new">Mais recentes</option>
            <option value="hot">Mais populares</option>
          </select>
        </div>
      </section>

      <section class="blog-featured" aria-label="Post em destaque">
        <div id="featuredWrap"></div>
      </section>

      <section id="allPosts" class="blog-grid-wrap">
        <div class="blog-grid-head">
          <h2>Últimos artigos</h2>
          <p class="muted">Guias rápidos, estratégias e comparativos.</p>
        </div>

        <div class="blog-grid" id="blogGrid"></div>
        <div class="blog-pagination" id="blogPager"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small class="muted">© ForceLab Nutrition — Blog</small>
      </div>
    </footer>

    <div
      id="cartOverlay"
      class="cart-overlay"
      aria-hidden="true"
      onclick="toggleCart(false)"
    ></div>

    <div id="accountDrawer" class="acc-drawer" aria-hidden="true">
      <div class="acc-overlay" data-close="account" aria-hidden="true"></div>

      <aside class="acc-panel" role="dialog" aria-label="Conta">
        <header class="acc-head">
          <div class="acc-user">
            <div class="acc-avatar" aria-hidden="true">👤</div>
            <div>
              <button id="accTitle">Minha conta</button>
              <small id="accSub" class="muted"
                >Entrar para acompanhar pedidos</small
              >
            </div>
          </div>

          <button class="btn-mini ghost" type="button" data-close="account">
            Fechar
          </button>
        </header>

        <div class="acc-body" id="accBody"></div>
      </aside>
    </div>
    <script src="/js/header-component.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/header.js"></script>
    <script type="module" src="/js/blog.js"></script>
    <script type="module" src="/cliente/_shared/account-drawer.js"></script>
  </body>
</html>
