<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForceLab | Checkout</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="img/force-logo.png" type="image/x-icon" />
  </head>

  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">
          <div class="logo">
            <h1>FORCE<span>LAB</span></h1>
            <small>Checkout</small>
          </div>
        </a>

        <nav class="nav">
          <a href="cart.html">⬅ Voltar</a>
        </nav>
      </div>
    </header>

    <main class="section checkout-page">
      <div class="container">
        <h1 class="checkout-title">Finalizar Pedido</h1>

        <div class="checkout-layout checkout-2col">
          <!-- ESQUERDA: dados + pagamento (rola) -->
          <section class="checkout-left">
            <form class="checkout-form" id="checkoutForm">
              <h2>Contato</h2>

              <div class="field">
                <label>E-mail</label>
                <input
                  type="email"
                  name="email"
                  placeholder="test@testuser.com"
                  required
                />
              </div>

              <h2 style="margin-top: 18px">Entrega</h2>

              <div class="form-row">
                <div class="field">
                  <label>Nome</label>
                  <input
                    type="text"
                    name="nome"
                    placeholder="Seu nome"
                    required
                  />
                </div>
                <div class="field">
                  <label>WhatsApp</label>
                  <input
                    type="text"
                    name="whatsapp"
                    placeholder="(00) 00000-0000"
                    required
                  />
                </div>
              </div>

              <div class="field">
                <label>Endereço completo</label>
                <input
                  type="text"
                  name="endereco"
                  placeholder="Rua, número, bairro, cidade/UF"
                  required
                />
              </div>

              <div class="field">
                <label>Observações</label>
                <input
                  type="text"
                  name="obs"
                  placeholder="Ex: entregar após 18h"
                />
              </div>

              <!-- PAGAMENTO (fica embaixo na esquerda) -->
              <div class="pay-left">
                <h2>Pagamento</h2>
                <p class="muted small">Pix ou Cartão</p>

                <div id="paymentBrick_container"></div>
                <small
                  id="payMsg"
                  class="muted"
                  style="display: block; margin-top: 10px"
                ></small>
              </div>
            </form>
          </section>

          <!-- DIREITA: resumo fixo -->
          <aside class="checkout-right">
            <div class="checkout-sticky">
              <!-- ITENS -->
              <div class="checkout-box">
                <div class="summary-head" style="margin-bottom: 8px">
                  <h3>Itens do pedido</h3>
                  <span class="summary-badge" id="summaryItems">0 itens</span>
                </div>
                <div id="checkoutItems" class="checkout-items"></div>
              </div>

              <!-- CUPOM -->
              <div class="checkout-box">
                <div class="summary-inline">
                  <input
                    id="couponInput"
                    class="summary-input"
                    placeholder="Código de desconto"
                  />
                  <button
                    class="btn btn-ghost btn-sm"
                    id="applyCoupon"
                    type="button"
                  >
                    Aplicar
                  </button>
                </div>
                <small class="summary-help" id="couponMsg"></small>
              </div>

              <!-- RESUMO -->
              <div class="order-summary">
                <div class="summary-row">
                  <span>Subtotal</span>
                  <strong id="sumSubtotal">R$ 0,00</strong>
                </div>

                <div class="summary-row">
                  <span>Frete</span>
                  <strong id="sumShipping">R$ 0,00</strong>
                </div>

                <div class="summary-divider"></div>

                <div class="summary-row total">
                  <span>Total</span>
                  <strong id="sumTotal">R$ 0,00</strong>
                </div>

                <p class="summary-note" id="sumETA">
                  Calcule o frete informando seu CEP.
                </p>

                <div class="summary-box">
                  <label class="summary-label" for="cepInput"
                    >Calcular frete (CEP)</label
                  >
                  <div class="summary-inline">
                    <input
                      id="cepInput"
                      class="summary-input"
                      inputmode="numeric"
                      placeholder="00000-000"
                    />
                    <button
                      class="btn btn-primary btn-sm"
                      id="calcShipping"
                      type="button"
                    >
                      Calcular
                    </button>
                  </div>
                  <small class="summary-help" id="shipMsg"></small>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <!-- PAY STATUS OVERLAY -->
    <div class="pay-steps" id="paySteps" aria-hidden="true">
      <div class="pay-steps-card">
        <div class="pay-spinner" aria-hidden="true"></div>
        <div class="pay-steps-text">
          <strong id="payStepsTitle">Confirmando pagamento…</strong>
          <p class="muted" id="payStepsSub">Aguarde um instante.</p>
        </div>

        <div class="pay-progress">
          <div class="pay-bar" id="payBar"></div>
        </div>

        <small class="muted" id="payHint">Não feche esta página.</small>
      </div>
    </div>
    <script src="js/cart.js"></script>
    <script src="js/checkoutSummary.js"></script>
    <!-- Render de itens no checkout -->
    <script>
      (function () {
        function brl(v) {
          return Number(v || 0).toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          });
        }
        function getCart() {
          try {
            return JSON.parse(localStorage.getItem("cart")) || [];
          } catch {
            return [];
          }
        }

        const wrap = document.getElementById("checkoutItems");

        function renderItems() {
          if (!wrap) return;
          const cart = getCart();
          wrap.innerHTML = "";

          if (cart.length === 0) {
            wrap.innerHTML = '<p class="muted">Seu carrinho está vazio.</p>';
            return;
          }

          cart.forEach((it) => {
            const qty = Number(it.qty) || 1;
            const price = Number(it.price) || 0;
            wrap.innerHTML += `
        <div class="checkout-item">
          <img src="${it.image}" alt="${it.name}">
          <div>
            <strong>${it.name}</strong>
            <small>${qty}x • ${brl(price)}</small>
          </div>
          <span class="checkout-sub">${brl(price * qty)}</span>
        </div>
      `;
          });
        }

        window.addEventListener("cartUpdated", renderItems);
        renderItems();
      })();
    </script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script type="module" src="/js/checkout.js"></script>
    <script type="module" src="/cliente/_shared/account-drawer.js"></script>
  </body>
</html>
