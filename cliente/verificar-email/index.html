<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verifique seu e-mail | ForceLab</title>
  <link rel="stylesheet" href="/cliente/_shared/cliente.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Verifique seu e-mail</h1>
      <p class="muted small">
        Enviamos um link de confirmação para o seu e-mail. Abra sua caixa de entrada e confirme.
      </p>

      <button class="btn" id="btnReload" type="button">Já confirmei</button>
      <button class="btn" id="btnResend" type="button" style="margin-top:10px;">Reenviar e-mail</button>

      <div class="msg" id="msg" style="display:none;"></div>

      <a class="link" href="/cliente/login/">Voltar para login</a>
    </section>
  </main>

  <script type="module">
    import { auth } from "../_shared/auth.js";
    import { sendEmailVerification, reload } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

    const btnReload = document.getElementById("btnReload");
    const btnResend = document.getElementById("btnResend");
    const msg = document.getElementById("msg");

    function show(text, ok=true){
      msg.style.display="block";
      msg.textContent=text;
      msg.style.borderColor = ok ? "rgba(60,255,160,.25)" : "rgba(255,80,80,.25)";
      msg.style.background = ok ? "rgba(60,255,160,.08)" : "rgba(255,80,80,.08)";
    }

    btnResend.addEventListener("click", async ()=>{
      const user = auth.currentUser;
      if (!user) return location.href="/cliente/login/";
      await sendEmailVerification(user);
      show("E-mail reenviado ✅");
    });

    btnReload.addEventListener("click", async ()=>{
      const user = auth.currentUser;
      if (!user) return location.href="/cliente/login/";
      await reload(user);
      if (auth.currentUser?.emailVerified) {
        location.href="/cliente/conta/";
      } else {
        show("Ainda não confirmou. Verifique a caixa de entrada/spam.", false);
      }
    });
  </script>
</body>
</html>
