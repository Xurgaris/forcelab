<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entrar | ForceLab</title>
  <link rel="stylesheet" href="/cliente/_shared/cliente.css" />
   <link rel="shortcut icon" href="../img/force-logo.png" type="image/x-icon" />
</head>

<body>
  <main class="wrap">
    <section class="card">
      <h1>Entrar</h1>
      <p class="muted">Acesse com email e senha para ver seus pedidos.</p>

      <form id="form" class="form">
        <label>
          <span>Email</span>
          <input id="email" type="email" placeholder="seuemail@exemplo.com" required />
        </label>

        <label>
          <span>Senha</span>
          <input id="pass" type="password" placeholder="••••••••" required />
        </label>

        <button class="btn" type="submit" id="btnLogin">Entrar</button>
        
        <button class="btn" type="button" id="btnRegister" style="opacity:.92;">
          Criar conta
        </button>

        <button class="btn" type="button" id="btnReset" style="opacity:.85;">
          Esqueci minha senha
        </button>
      </form>

      <div id="msg" class="msg" style="display:none;"></div>

      <a class="link" href="/">← Voltar para a loja</a>
    </section>
  </main>

  <script type="module" src="/cliente/_shared/auth.js"></script>
  <script type="module" src="./login.js"></script>
</body>
</html>
