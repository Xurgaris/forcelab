<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meus pedidos | ForceLab</title>
  <link rel="stylesheet" href="/cliente/_shared/cliente.css" />
   <link rel="shortcut icon" href="../img/force-logo.png" type="image/x-icon" />
</head>

<body>
  <main class="wrap">
    <section class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div>
          <h1 style="margin:0;">Meus pedidos</h1>
          <p class="muted" id="sub" style="margin:6px 0 0;">Carregando...</p>
        </div>
        <a class="btn" href="/cliente/conta/" style="text-decoration:none; display:inline-block;">Minha conta</a>
      </div>

      <div id="list" style="margin-top:14px; display:flex; flex-direction:column; gap:12px;"></div>

      <a class="link" href="/" style="margin-top:16px;">← Voltar para a loja</a>
    </section>
  </main>
  <!-- DRAWER: DETALHES DO PEDIDO -->
<div class="order-drawer" id="orderDrawer" aria-hidden="true">
  <div class="order-overlay" data-close="order"></div>

  <aside class="order-panel" role="dialog" aria-label="Detalhe do pedido">
    <header class="order-head">
      <div>
        <strong id="odTitle">Pedido</strong>
        <small class="muted" id="odSub" style="display:block;margin:2px 0 0;">—</small>
      </div>
      <button class="btn" type="button" data-close="order" style="padding:10px 12px;border-radius:12px;">
        Fechar
      </button>
    </header>

    <div class="order-body" id="odBody">
      <p class="muted">Carregando…</p>
    </div>
  </aside>
</div>

<style>
  .order-drawer{position:fixed; inset:0; display:none; z-index:9999;}
  .order-drawer.open{display:block;}
  .order-overlay{position:absolute; inset:0; background:rgba(0,0,0,.55);}

  .order-panel{
    position:absolute; top:0; right:0; height:100%; width:min(520px, 92vw);
    background: rgba(10,10,10,.98);
    border-left:1px solid rgba(255,255,255,.12);
    padding:14px;
    overflow:auto;
  }

  .order-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.10);
  }

  .order-body{padding-top:12px;}
  .od-kv{display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.08);}
  .od-items{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .od-item{
    display:flex; gap:10px; align-items:center;
    padding:10px; border:1px solid rgba(255,255,255,.10);
    border-radius:14px; background: rgba(255,255,255,.04);
  }
  .od-item img{width:52px; height:52px; object-fit:cover; border-radius:12px; background:#111;}
  /* timeline */
.timeline{margin-top:14px; padding:12px; border-radius:14px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.04);}
.tl-row{display:flex; align-items:flex-start; gap:10px; padding:10px 0;}
.tl-row + .tl-row{border-top:1px solid rgba(255,255,255,.08);}
.tl-dot{
  width:14px;height:14px;border-radius:999px;margin-top:2px;
  border:2px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.06);
}
.tl-row.done .tl-dot{
  border-color: rgba(255,26,26,.75);
  background: rgba(255,26,26,.30);
  box-shadow: 0 0 0 3px rgba(255,26,26,.10);
}
.tl-row.current .tl-dot{
  border-color: rgba(255,255,255,.65);
  background: rgba(255,255,255,.18);
  box-shadow: 0 0 0 3px rgba(255,255,255,.08);
}
.tl-title{font-weight:800;}
.tl-sub{display:block; margin-top:2px; font-size:13px; color: rgba(255,255,255,.72);}
</style>

<script>
  // fecha drawer (overlay ou botão)
  document.addEventListener("click", (e)=>{
    const t = e.target;
    if (t && t.closest && t.closest('[data-close="order"]')) {
      const d = document.getElementById("orderDrawer");
      d?.classList.remove("open");
      d?.setAttribute("aria-hidden","true");
      document.body.style.overflow = "";
    }
  });
</script>

  <script type="module" src="/cliente/_shared/auth.js"></script>
  <script type="module" src="./pedidos.js"></script>
</body>
</html>
